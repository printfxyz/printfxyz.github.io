<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>printfxyz test page</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    main {
      max-width: 720px;
      padding: 3rem;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
      text-align: center;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 8vw, 4rem);
      letter-spacing: -0.06em;
    }

    p {
      margin: 0.75rem 0 0;
      color: #94a3b8;
      font-size: 1.125rem;
      line-height: 1.7;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      padding: 0.5rem 0.875rem;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">GitHub Pages test</div>
    <h1>Hello, printfxyz.</h1>
    <p>This is a temporary test page for <strong>printfxyz.github.io</strong>.</p>
    <p>If you can see this, the repository is serving HTML from the main branch.</p>
  </main>
</body>
</html>
